<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPD | Secure Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; font-family: 'Inter', sans-serif; }
        .login-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-primary { background: #3b82f6; border: none; font-weight: 600; transition: all 0.3s ease; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
        .form-control { background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; color: white; padding: 12px; }
        .form-control:focus { background: rgba(15, 23, 42, 0.8); color: white; border-color: #3b82f6; box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.2); }
        .form-control::placeholder { color: #64748b; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="mb-3"><i class="bi bi-shield-lock-fill text-info" style="font-size: 3rem;"></i></div>
            <h2 class="fw-bold mb-1">🛡️ SPD PORTAL</h2>
            <p class="text-secondary small">Security Policy Deployment & Monitoring</p>
        </div>

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label small text-secondary fw-bold">GITHUB USERNAME</label>
                <input type="text" name="username" class="form-control" placeholder="Dhanajeyan77" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-secondary fw-bold">PORTAL PASSWORD</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 mb-3">Authorize & Enter Dashboard</button>
        </form>

        <div class="text-center mt-3">
            <p class="small text-secondary mb-1">New to the platform?</p>
            <a href="/register" class="text-info small text-decoration-none fw-bold">Create a Security Account</a>
        </div>
    </div>

</body>
</html>
