<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPD | Create Account</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .btn-info {
            background-color: #06b6d4;
            border: none;
            color: white;
        }
        .btn-info:hover {
            background-color: #0891b2;
            color: white;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(6, 182, 212, 0.25);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold">🛡️ JOIN SPD</h2>
            <p class="text-secondary small">Start Monitoring Your DevSecOps Pipeline</p>
        </div>

        <form action="/register" method="POST">
            <div class="mb-3">
                <label class="form-label small">GitHub Username</label>
                <input type="text" name="username" class="form-control" placeholder="e.g. Dhanajeyan77" required>
                <div class="form-text text-secondary" style="font-size: 0.75rem;">Must match your actual GitHub handle for telemetry routing.</div>
            </div>
            
            <div class="mb-3">
                <label class="form-label small">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="student@kamarajengg.edu.in" required>
                <div class="form-text text-secondary" style="font-size: 0.75rem;">We'll send audit alerts to this address.</div>
            </div>

            <div class="mb-4">
                <label class="form-label small">Choose Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-info w-100 py-2 mb-3">Create Security Profile</button>
        </form>

        <div class="text-center">
            <p class="small text-secondary mb-0">Already have an account?</p>
            <a href="/" class="text-info small text-decoration-none">Sign In to Dashboard</a>
        </div>
    </div>

</body>
</html>
