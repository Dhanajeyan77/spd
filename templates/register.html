<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPD | Create Account</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; font-family: 'Inter', sans-serif; }
        .register-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-info { background: #06b6d4; border: none; color: white; font-weight: 600; transition: all 0.3s ease; }
        .btn-info:hover { background: #0891b2; color: white; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.4); }
        .form-control { background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; color: white; padding: 12px; }
        .form-control:focus { background: rgba(15, 23, 42, 0.8); color: white; border-color: #06b6d4; box-shadow: 0 0 0 0.25rem rgba(6, 182, 212, 0.2); }
        .form-control::placeholder { color: #64748b; }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-1">🛡️ JOIN SPD</h2>
            <p class="text-secondary small">Start Monitoring Your DevSecOps Pipeline</p>
        </div>

        <form action="/register" method="POST">
            <div class="mb-3">
                <label class="form-label small text-secondary fw-bold">GITHUB USERNAME</label>
                <input type="text" name="username" class="form-control" placeholder="e.g. Dhanajeyan77" required>
                <div class="form-text text-secondary" style="font-size: 0.7rem;">Matches your GitHub handle for automated telemetry routing.</div>
            </div>
            
            <div class="mb-3">
                <label class="form-label small text-secondary fw-bold">EMAIL ADDRESS</label>
                <input type="email" name="email" class="form-control" placeholder="dhanajeyan@student.com" required>
                <div class="form-text text-secondary" style="font-size: 0.7rem;">Used for real-time security audit alerts.</div>
            </div>

            <div class="mb-4">
                <label class="form-label small text-secondary fw-bold">PORTAL PASSWORD</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-info w-100 py-3 mb-3">Create Security Profile</button>
        </form>

        <div class="text-center mt-2">
            <p class="small text-secondary mb-1">Already have an account?</p>
            <a href="/" class="text-info small text-decoration-none fw-bold">Sign In to Dashboard</a>
        </div>
    </div>

</body>
</html>
