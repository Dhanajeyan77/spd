<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Onboard - SPD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-primary">🛡️ Register Your Project</h2>
            <p>Paste your GitHub details to activate the DevSecOps Pipeline.</p>
            <form action="/inject" method="POST">
                <div class="mb-3">
                    <label class="form-label">GitHub Username</label>
                    <input type="text" name="owner" class="form-control" placeholder="e.g. Dhanajeyan77" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Repository Name</label>
                    <input type="text" name="repo" class="form-control" placeholder="e.g. canteen-app" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Your Personal Access Token (PAT)</label>
                    <input type="password" name="token" class="form-control" required>
                    <small class="text-muted">Generate a token with 'Contents: Write' permission.</small>
                </div>
                <button type="submit" class="btn btn-primary w-100">Activate Security Audit</button>
            </form>
        </div>
    </div>
</body>
</html>
