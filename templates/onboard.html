<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Onboard - SPD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow p-4 border-0">
            <h2 class="text-primary fw-bold">🛡️ Register Your Project</h2>
            <p class="text-muted">Configure your DevSecOps pipeline for SAST and DAST auditing.</p>
            <hr>
            <form action="/inject" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">GitHub Username</label>
                        <input type="text" name="owner" class="form-control" placeholder="Dhanajeyan77" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Repository Name</label>
                        <input type="text" name="repo" class="form-control" placeholder="canteen-app" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Personal Access Token (PAT)</label>
                    <input type="password" name="token" class="form-control" placeholder="ghp_xxxxxxxxxxxx" required>
                    <small class="text-muted">Requires 'Contents: Write' and 'Actions: Write' permissions.</small>
                </div>

                <div class="row bg-light p-3 rounded mb-3 border">
                    <h6 class="text-secondary fw-bold">Runtime Configuration (For DAST)</h6>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Technology Stack</label>
                        <select name="stack" class="form-select">
                            <option value="python">Python (Flask/Django)</option>
                            <option value="node">Node.js (Express)</option>
                            <option value="java">Java (Spring Boot)</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Internal Port</label>
                        <input type="number" name="port" class="form-control" value="5000" required>
                        <small class="text-muted">The port your app uses inside the runner.</small>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Activate SPD Security Audit</button>
            </form>
        </div>
    </div>
</body>
</html>
