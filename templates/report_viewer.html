<!DOCTYPE html>
<html>
<head>
    <title>SPD | Security Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f172a; color: white; }
        iframe { width: 100%; height: 80vh; border-radius: 8px; background: white; }
        .footer-actions { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 0 0 8px 8px; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>🔍 Security Telemetry: {{ filename }}</h3>
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>

        <iframe src="/view/{{ username }}/{{ filename }}"></iframe>

        <div class="footer-actions d-flex justify-content-between align-items-center">
            <div>
                <p class="mb-0 small text-secondary">Report Generated via SPD Stealth Engine</p>
                <p class="mb-0 fw-bold text-warning">Status: 7 Warnings Detected</p>
            </div>
            <form action="/send-manual-mail" method="POST">
                <input type="hidden" name="filename" value="{{ filename }}">
                <button type="submit" class="btn btn-info">📧 Send this report to my Email</button>
            </form>
        </div>
    </div>
</body>
</html>
